name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release

  build-macos:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    name: Build macOS ${{ matrix.target }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            artifact_name: scout-macos-x64
          - target: aarch64-apple-darwin
            artifact_name: scout-macos-arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install macOS system dependencies
        if: runner.os == 'macOS'
        run: brew install ffmpeg

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build unsigned macOS release artifacts
        id: tauri
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: bun run tauri
          args: --target ${{ matrix.target }}

      - name: Parse artifact paths
        id: parse-artifacts
        run: |
          echo "paths<<EOF" >> $GITHUB_OUTPUT
          echo '${{ steps.tauri.outputs.artifactPaths }}' | jq -r '.[]' >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Upload bundled artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          if-no-files-found: error
          path: ${{ steps.parse-artifacts.outputs.paths }}

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [release-please, build-macos]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: scout-macos-*
          path: release-artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd release-artifacts
          find . -maxdepth 1 -type f -print0 | sort -z | xargs -0 shasum -a 256 > SHA256SUMS.txt

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          append_body: true
          body: |
            > [!IMPORTANT]
            > These macOS artifacts are currently unsigned and not notarized. Gatekeeper warnings are expected until Apple signing and notarization are configured.
          files: |
            release-artifacts/**
          fail_on_unmatched_files: true
